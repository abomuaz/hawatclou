const DAYS_S    = ["أحد","اثنين","ثلاثاء","أربعاء","خميس","جمعة","سبت"];
const MONTHS_AR = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
const HIJRI_M   = ["محرم","صفر","ربيع الأول","ربيع الثاني","جمادى الأولى","جمادى الآخرة","رجب","شعبان","رمضان","شوال","ذو القعدة","ذو الحجة"];

function toHijri(d) {
  let gy=d.getFullYear(), gm=d.getMonth()+1, gd=d.getDate(), y=gy, m=gm;
  if (m<=2){y--;m+=12;}
  const A=Math.floor(y/100), B=2-A+Math.floor(A/4);
  const JD=Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+gd+B-1524;
  let l=JD-1948440+10632;
  const n=Math.floor((l-1)/10631); l=l-10631*n+354;
  const j=Math.floor((10985-l)/5316)*Math.floor(50*l/17719)+Math.floor(l/5670)*Math.floor(43*l/15238);
  l=l-Math.floor((30-j)/15)*Math.floor(17719*j/50)-Math.floor(j/16)*Math.floor(15238*j/43)+29;
  const hm=Math.floor(24*l/709), hd=l-Math.floor(709*hm/24), hy=30*n+j-30;
  return { y:hy, m:hm-1, d:hd };
}

function useClock() {
  const [now, setNow] = useState(new Date());
  useEffect(() => { const t = setInterval(()=>setNow(new Date()), 1000); return ()=>clearInterval(t); }, []);
  const h=now.getHours(), mn=now.getMinutes(), s=now.getSeconds();
  const pad = n => String(n).padStart(2,"0");
  const hj = toHijri(now);
  return {
    day:      DAYS_AR[now.getDay()],
    gregorian:`${now.getDate()} ${MONTHS_AR[now.getMonth()]} ${now.getFullYear()}م`,
    hijri:    `${hj.d} ${HIJRI_M[hj.m]} ${hj.y}هـ`,
    time:     `${pad(h%12||12)}:${pad(mn)}:${pad(s)} ${h>=12?"م":"ص"}`,
  };
}

/* ══════ WEATHER ══════ */
function rng(seed){ let s=seed; return()=>{ s=(s*1664525+1013904223)&0xffffffff; return(s>>>0)/0xffffffff; }; }
const season = m => [12,1,2].includes(m)?"winter":[3,4,5].includes(m)?"spring":[6,7,8].includes(m)?"summer":"fall";
const SEASON = {winter:"❄️ الشتاء",spring:"🌸 الربيع",summer:"☀️ الصيف",fall:"🍂 الخريف"};
const sCol = s => s>=70?"#10b981":s>=40?"#f59e0b":"#ef4444";
const sLbl = s => s>=70?"ممتاز":s>=40?"مقبول":"صعب";

function mkWx(loc, seed, mode) {
  const r=rng(seed), g=loc.reg==="الخليج العربي", bt=g?27+(loc.lat-25)*.4:29-(loc.lat-17)*.35;
  return {
    temp:(bt+r()*6-1).toFixed(1), wtemp:(bt-2+r()*5).toFixed(1),
    wind:(3+r()*(mode==="boat"?30:24)).toFixed(1),
    dir:["شمال","شمال شرق","شرق","جنوب شرق","جنوب","جنوب غرب","غرب","شمال غرب"][Math.floor(r()*8)],
    wave:(0.1+r()*(mode==="boat"?4:2.8)).toFixed(1),
    vis:(5+r()*20).toFixed(0), hum:(45+r()*45).toFixed(0),
    tide:r()>.5?"مد":"جزر", pressure:(1005+r()*20).toFixed(0), uv:Math.floor(r()*10)+1,
  };
}
function shoreScore(w){let s=100;const wi=+w.wind,wa=+w.wave,vi=+w.vis;if(wi>22)s-=35;else if(wi>15)s-=18;else if(wi>10)s-=8;if(wa>2)s-=28;else if(wa>1.5)s-=16;else if(wa>1)s-=7;if(vi<6)s-=14;else if(vi<10)s-=5;if(w.tide==="مد")s+=5;return Math.max(10,Math.min(100,Math.round(s)));}
function boatScore(w){let s=100;const wi=+w.wind,wa=+w.wave,vi=+w.vis;if(wi>25)s-=45;else if(wi>18)s-=28;else if(wi>12)s-=12;if(wa>2.5)s-=45;else if(wa>2)s-=28;else if(wa>1.5)s-=14;else if(wa>1)s-=6;if(vi<6)s-=20;else if(vi<10)s-=8;if(+w.pressure<1008)s-=8;return Math.max(5,Math.min(100,Math.round(s)));}

function mk14(loc, mode) {
  const today = new Date();
  return Array.from({length:14},(_,i)=>{
    const d=new Date(today); d.setDate(today.getDate()+i);
    const seed=loc.id.charCodeAt(0)*7777+(loc.id.charCodeAt(1)||1)*333+i*1234+d.getMonth()*99+(mode==="boat"?5555:0);
    const wx=mkWx(loc,seed,mode);
    return {date:d,dayS:DAYS_S[d.getDay()],dayF:DAYS_AR[d.getDay()],dateStr:`${d.getDate()} ${MONTHS_AR[d.getMonth()]}`,isToday:i===0,wx,score:mode==="boat"?boatScore(wx):shoreScore(wx)};
  });
}

/* ══════ AI ══════ */
async function callAI(prompt) {
  const r = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"content-type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:900,messages:[{role:"user",content:prompt}]})});
  const d = await r.json();
  if(!r.ok) throw new Error(d?.error?.message||`HTTP ${r.status}`);
  return d.content[0].text;
}
const mkPrompt = (type,loc,wx,label,sn) => {
  const b=`الموقع: ${loc.name} — ${loc.reg} (${loc.type}) | ${label} | ${SEASON[sn]}\n🌡️${wx.temp}° | 💧${wx.wtemp}° | 💨${wx.wind}عق(${wx.dir}) | 🌊${wx.wave}م | 👁️${wx.vis}كم | ${wx.tide==="مد"?"🔼مد":"🔽جزر"} | 🔵${wx.pressure}هب | ☀️UV${wx.uv}`;
  return type==="shore"?`خبير صيد ساحلي. ${b}\nحلّل: 1.**الحكم** 2.**الأمواج والمد** 3.**أفضل نقطة** 4.**الطعم والعمق** 5.**التوقيت والتحذير**. موجز مع رموز.`
       :type==="boat" ?`خبير صيد بحري. ${b}\nحلّل: 1.**أمان الإبحار** 2.**الأمواج والرياح** 3.**المسافة والعمق** 4.**أفضل تقنية** 5.**تحذيرات السلامة**. موجز مع رموز.`
       :`خبير صيد. ${b}\nتقرير: 1.**الحكم** 2.**عوامل الطقس** 3.**أفضل أسلوب** 4.**التوقيت** 5.**التحذير**. موجز مع رموز.`;
};

  const tabs = [{i:"🏠",l:"الرئيسية",s:"home"},{i:"🏖️",l:"الشاطئ",s:"shore"},{i:"⛵",l:"القارب",s:"boat"},{i:"🗺️",l:"الخريطة",s:"map"},{i:"🎣",l:"النتائج",s:"res"}];
  return (
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(2,14,31,.97)",borderTop:"1px solid rgba(56,189,248,.15)",display:"flex",padding:"8px 0 12px",zIndex:299}}>
      {tabs.map(t => {
        const off = t.s!=="home" && !sel;
        return (
          <button key={t.s} onClick={()=>!off&&setScr(t.s)}
            style={{flex:1,background:"none",border:"none",cursor:off?"default":"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:scr===t.s?"#38bdf8":"rgba(148,210,255,.35)",opacity:off?.22:1,transition:"color .2s"}}>
            <span style={{fontSize:17}}>{t.i}</span>
            <span style={{fontSize:9,fontWeight:700}}>{t.l}</span>
          </button>
        );
      })}
    </div>
  );
}

/* ══════ SECRET SPOTS ══════ */
function SecretSpots() {
  const [spots, setSpots]     = useState([]);
  const [adding, setAdding]   = useState(false);
  const [name, setName]       = useState("");
  const [locating, setLocating] = useState(false);
  const [coords, setCoords]   = useState(null);
  const [locErr, setLocErr]   = useState("");
  const [delId, setDelId]     = useState(null);
  const [loaded, setLoaded]   = useState(false);

  // load spots on mount
  useEffect(() => {
    async function load() {
      try {
        const res = await window.storage.get("hawat_spots");
        if (res?.value) setSpots(JSON.parse(res.value));
      } catch(_) {}
      setLoaded(true);
    }
    load();
  }, []);

  async function save(updated) {
    setSpots(updated);
    try { await window.storage.set("hawat_spots", JSON.stringify(updated)); } catch(_) {}
  }

  function getLocation() {
    setLocating(true); setLocErr(""); setCoords(null);
    if (!navigator.geolocation) { setLocErr("المتصفح لا يدعم تحديد الموقع"); setLocating(false); return; }
    navigator.geolocation.getCurrentPosition(
      pos => { setCoords({ lat: pos.coords.latitude, lng: pos.coords.longitude }); setLocating(false); },
      ()  => { setLocErr("تعذّر تحديد الموقع — تحقق من صلاحيات GPS"); setLocating(false); }
    );
  }

  function addSpot() {
    if (!name.trim() || !coords) return;
    const spot = { id: Date.now(), name: name.trim(), lat: coords.lat, lng: coords.lng, date: new Date().toLocaleDateString("ar-SA") };
    save([spot, ...spots]);
    setName(""); setCoords(null); setAdding(false);
  }

  function deleteSpot(id) { save(spots.filter(s => s.id !== id)); setDelId(null); }

  const mapsUrl = (lat, lng) => `https://www.google.com/maps?q=${lat},${lng}`;

  if (!loaded) return null;

  return (
    <div style={{marginTop:18}}>
      {/* Section header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:11}}>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <span style={{fontSize:18}}>🔐</span>
          <div>
            <div style={{fontSize:13,fontWeight:900,color:"#f59e0b"}}>مواقعي الخاصة</div>
            <div style={{fontSize:9,color:"rgba(148,210,255,.4)"}}>محفوظة على جهازك فقط · لا يراها أحد</div>
          </div>
        </div>
        <button className="tap" onClick={()=>{setAdding(!adding);setCoords(null);setName("");setLocErr("");}}
          style={{display:"flex",alignItems:"center",gap:5,padding:"7px 12px",borderRadius:10,background:adding?"rgba(239,68,68,.12)":"rgba(245,158,11,.14)",border:`1px solid ${adding?"rgba(239,68,68,.3)":"rgba(245,158,11,.35)"}`,color:adding?"#f87171":"#f59e0b",fontSize:11,fontWeight:900,cursor:"pointer"}}>
          <span>{adding?"✕":"＋"}</span>{adding?"إلغاء":"إضافة موقع"}
        </button>
      </div>

      {/* Add form */}
      {adding && (
        <div style={{background:"rgba(245,158,11,.07)",borderRadius:14,padding:"14px",border:"1px solid rgba(245,158,11,.25)",marginBottom:12,animation:"fu .25s ease"}}>
          {/* name input */}
          <div style={{marginBottom:10}}>
            <div style={{fontSize:10,color:"rgba(245,158,11,.7)",fontWeight:700,marginBottom:5}}>📝 اسم الموقع</div>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="مثال: شعبة الهامور 🐟"
              style={{width:"100%",padding:"9px 13px",borderRadius:10,background:"rgba(255,255,255,.06)",border:"1px solid rgba(245,158,11,.3)",color:"#e8f4ff",fontSize:13,outline:"none",direction:"rtl"}}/>
          </div>
          {/* GPS button */}
          <button className="tap" onClick={getLocation} disabled={locating}
            style={{width:"100%",padding:"10px",borderRadius:10,background:coords?"rgba(16,185,129,.12)":"rgba(56,189,248,.1)",border:`1px solid ${coords?"rgba(16,185,129,.35)":"rgba(56,189,248,.28)"}`,color:coords?"#10b981":"#38bdf8",fontSize:12,fontWeight:800,cursor:"pointer",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
            {locating
              ? <><span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>⚙️</span> جاري تحديد موقعك...</>
              : coords
              ? <><span>✅</span> تم تحديد الموقع ({coords.lat.toFixed(4)}, {coords.lng.toFixed(4)})</>
              : <><span>📡</span> تحديد موقعي الحالي (GPS)</>
            }
          </button>
          {locErr && <div style={{fontSize:11,color:"#f87171",marginBottom:8,textAlign:"center"}}>⚠️ {locErr}</div>}
          {/* save btn */}
          <button className="tap" onClick={addSpot} disabled={!name.trim()||!coords}
            style={{width:"100%",padding:"11px",borderRadius:10,background:(!name.trim()||!coords)?"rgba(255,255,255,.04)":"rgba(245,158,11,.18)",border:`1px solid ${(!name.trim()||!coords)?"rgba(255,255,255,.08)":"rgba(245,158,11,.45)"}`,color:(!name.trim()||!coords)?"rgba(148,210,255,.25)":"#f59e0b",fontSize:13,fontWeight:900,cursor:(!name.trim()||!coords)?"default":"pointer"}}>
            💾 حفظ الموقع
          </button>
        </div>
      )}

      {/* Spots list */}
      {spots.length === 0 ? (
        <div style={{textAlign:"center",padding:"22px 16px",background:"rgba(255,255,255,.02)",borderRadius:13,border:"1px dashed rgba(245,158,11,.15)"}}>
          <div style={{fontSize:28,marginBottom:7,opacity:.5}}>📍</div>
          <div style={{fontSize:12,color:"rgba(148,210,255,.3)",lineHeight:1.7}}>لا توجد مواقع محفوظة بعد<br/>أضف أول موقع سري لك!</div>
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {spots.map(sp => (
            <div key={sp.id} style={{background:"rgba(255,255,255,.04)",borderRadius:13,border:"1px solid rgba(245,158,11,.18)",overflow:"hidden",animation:"fu .2s ease"}}>
              {delId === sp.id ? (
                /* confirm delete */
                <div style={{padding:"12px 14px",background:"rgba(239,68,68,.08)",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                  <span style={{fontSize:11,color:"#f87171",fontWeight:700}}>حذف "{sp.name}"؟</span>
                  <div style={{display:"flex",gap:6}}>
                    <button className="tap" onClick={()=>deleteSpot(sp.id)}
                      style={{padding:"5px 12px",borderRadius:8,background:"rgba(239,68,68,.2)",border:"1px solid rgba(239,68,68,.4)",color:"#f87171",fontSize:11,fontWeight:900,cursor:"pointer"}}>حذف</button>
                    <button className="tap" onClick={()=>setDelId(null)}
                      style={{padding:"5px 12px",borderRadius:8,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",color:"rgba(148,210,255,.6)",fontSize:11,cursor:"pointer"}}>إلغاء</button>
                  </div>
                </div>
              ) : (
                <div style={{padding:"11px 13px",display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:38,height:38,borderRadius:10,background:"rgba(245,158,11,.12)",border:"1px solid rgba(245,158,11,.25)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <span style={{fontSize:19}}>📍</span>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:900,color:"#f59e0b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sp.name}</div>
                    <div style={{fontSize:9,color:"rgba(148,210,255,.4)",marginTop:2}}>{sp.lat.toFixed(5)}, {sp.lng.toFixed(5)} · {sp.date}</div>
                  </div>
                  <div style={{display:"flex",gap:6,flexShrink:0}}>
                    <a href={mapsUrl(sp.lat,sp.lng)} target="_blank" rel="noopener noreferrer"
                      style={{padding:"6px 10px",borderRadius:8,background:"rgba(56,189,248,.12)",border:"1px solid rgba(56,189,248,.28)",color:"#38bdf8",fontSize:11,fontWeight:700,textDecoration:"none",display:"flex",alignItems:"center",gap:3}}>
                      🗺️ <span>خريطة</span>
                    </a>
                    <button className="tap" onClick={()=>setDelId(sp.id)}
                      style={{padding:"6px 9px",borderRadius:8,background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.2)",color:"#f87171",fontSize:12,cursor:"pointer"}}>🗑️</button>
                  </div>
                </div>
              )}
            </div>
          ))}
          {spots.length > 0 && (
            <div style={{textAlign:"center",fontSize:10,color:"rgba(148,210,255,.3)",marginTop:2}}>
              🔒 {spots.length} موقع محفوظ على جهازك فقط
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ══════ SCORE RING ══════ */
function Ring({ score, size=88 }) {
  const R=size*.38, C=2*Math.PI*R, c=sCol(score);
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={R} fill="none" stroke="rgba(255,255,255,.08)" strokeWidth={size*.09}/>
      <circle cx={size/2} cy={size/2} r={R} fill="none" stroke={c} strokeWidth={size*.09}
        strokeDasharray={`${score/100*C} ${C}`} strokeLinecap="round"
        transform={`rotate(-90 ${size/2} ${size/2})`} style={{filter:`drop-shadow(0 0 5px ${c})`}}/>
      <text x={size/2} y={size/2+1} textAnchor="middle" fill={c} fontSize={size*.18} fontWeight="900" dominantBaseline="middle">{score}</text>
      <text x={size/2} y={size/2+size*.17} textAnchor="middle" fill="rgba(255,255,255,.38)" fontSize={size*.1}>{sLbl(score)}</text>
    </svg>
  );
}

/* ══════ WX GRID ══════ */
function WxGrid({ wx, small }) {
  const fs = small ? {i:14,v:11,l:8,p:"7px 4px",r:9} : {i:18,v:13,l:9,p:"10px 7px",r:12};
  const items = [
    {i:"🌡️",l:"الهواء",  v:`${wx.temp}°`,  c:"#f87171"},
    {i:"💧", l:"الماء",   v:`${wx.wtemp}°`, c:"#38bdf8"},
    {i:"🌊", l:"الأمواج", v:`${wx.wave}م`,  c:+wx.wave>1.5?"#ef4444":"#10b981"},
    {i:"💨", l:"الرياح",  v:`${wx.wind}عق`, c:"#fbbf24"},
    {i:"🧭", l:"الاتجاه", v:wx.dir,         c:"#a78bfa"},
    {i:"🌊", l:"المد",    v:wx.tide==="مد"?"🔼مد":"🔽جزر",c:"#10b981"},
    {i:"🔵", l:"الضغط",  v:wx.pressure,     c:"#60a5fa"},
    {i:"👁️",l:"الرؤية",  v:`${wx.vis}كم`,  c:"#22d3ee"},
    {i:"☀️", l:"UV",      v:wx.uv,          c:"#fb923c"},
  ];
  return (
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:small?5:8}}>
      {items.map(x => (
        <div key={x.l} style={{background:"rgba(255,255,255,.04)",borderRadius:fs.r,padding:fs.p,border:"1px solid rgba(255,255,255,.06)",textAlign:"center"}}>
          <div style={{fontSize:fs.i}}>{x.i}</div>
          <div style={{fontSize:fs.v,fontWeight:800,color:x.c,marginTop:2}}>{x.v}</div>
          <div style={{fontSize:fs.l,color:"rgba(148,210,255,.38)",marginTop:2}}>{x.l}</div>
        </div>
      ))}
    </div>
  );
}

/* ══════ AI BLOCK ══════ */
function AIBlock({ prompt, ac, ad, ab }) {
  const [st, setSt] = useState("idle");
  const [tx, setTx] = useState("");
  const [er, setEr] = useState("");
  const run = async () => {
    setSt("loading"); setTx(""); setEr("");
    try { setTx(await callAI(prompt)); setSt("done"); }
    catch(e) { setEr(e.message||"خطأ"); setSt("error"); }
  };
  if (st==="idle") return <button className="tap" onClick={run} style={{width:"100%",padding:"11px",borderRadius:11,background:ad,border:`1px solid ${ab}`,color:ac,fontSize:13,fontWeight:800,cursor:"pointer"}}>🤖 تحليل AI لهذا اليوم</button>;
  if (st==="loading") return (
    <div>{[88,70,82,60,76].map((w,k)=><div key={k} className="sh" style={{height:11,borderRadius:6,marginBottom:9,width:`${w}%`}}/>)}
      <div style={{textAlign:"center",fontSize:11,color:"rgba(148,210,255,.5)",display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:4}}>
        <span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⚙️</span>جاري التحليل...
      </div>
    </div>
  );
  if (st==="error") return (
    <div style={{background:"rgba(239,68,68,.08)",borderRadius:11,padding:13,border:"1px solid rgba(239,68,68,.25)"}}>
      <div style={{fontSize:12,color:"#f87171",fontWeight:800,marginBottom:5}}>⚠️ تعذّر جلب التحليل</div>
      <div style={{fontSize:11,color:"rgba(248,113,113,.7)",marginBottom:10}}>{er}</div>
      <button className="tap" onClick={run} style={{width:"100%",padding:"9px",borderRadius:9,background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.3)",color:"#f87171",fontSize:12,fontWeight:700,cursor:"pointer"}}>🔄 إعادة المحاولة</button>
    </div>
  );
  return (
    <div style={{background:"rgba(255,255,255,.03)",borderRadius:11,padding:13,border:"1px solid rgba(255,255,255,.06)"}}>
      <div style={{fontSize:10,color:ac,fontWeight:800,marginBottom:8}}>🤖 تحليل الذكاء الاصطناعي</div>
      <div className="ait" dangerouslySetInnerHTML={{__html:fmtAI(tx)}}/>
      <button className="tap" onClick={run} style={{marginTop:10,width:"100%",padding:"8px",borderRadius:9,background:ad,border:`1px solid ${ab}`,color:ac,fontSize:11,fontWeight:700,cursor:"pointer"}}>🔄 إعادة التحليل</button>
    </div>
  );
}

/* ══════ LOCATION PICKER (home only) ══════ */
function Picker({ onPick, current }) {
  const [q, setQ] = useState("");
  const [reg, setReg] = useState("all");
  const list = LOCS.filter(l => {
    const rOk = reg==="all"||(reg==="red"&&l.reg==="البحر الأحمر")||(reg==="gulf"&&l.reg==="الخليج العربي");
    const sOk = !q || l.name.includes(q) || l.grp.includes(q);
    return rOk && sOk;
  });
  const groups = [...new Set(list.map(l=>l.grp))].sort((a,b)=>GRP_ORDER.indexOf(a)-GRP_ORDER.indexOf(b));
  return (
    <div>
      {/* banner */}
      <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:12,padding:"10px 13px",background:"rgba(56,189,248,.06)",borderRadius:12,border:"1px solid rgba(56,189,248,.15)"}}>
        <span style={{fontSize:18}}>📍</span>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:900,color:"#38bdf8"}}>اختر موقع الصيد</div>
          <div style={{fontSize:10,color:"rgba(148,210,255,.4)"}}>يُطبَّق على جميع صفحات التطبيق</div>
        </div>
        {current && <span style={{fontSize:11,background:"rgba(16,185,129,.15)",color:"#10b981",border:"1px solid rgba(16,185,129,.3)",borderRadius:8,padding:"3px 9px",fontWeight:800,flexShrink:0}}>✓ {current.name}</span>}
      </div>
      {/* search */}
      <div style={{position:"relative",marginBottom:9}}>
        <span style={{position:"absolute",right:11,top:"50%",transform:"translateY(-50%)",fontSize:13,color:"rgba(148,210,255,.35)"}}>🔍</span>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="ابحث عن موقع..."
          style={{width:"100%",padding:"9px 34px 9px 12px",borderRadius:11,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",color:"#e8f4ff",fontSize:13,outline:"none",direction:"rtl"}}/>
      </div>
      {/* region tabs */}
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {[["all","🌍 الكل"],["red","🔴 الأحمر"],["gulf","🔵 الخليج"]].map(([v,lb])=>(
          <button key={v} onClick={()=>setReg(v)}
            style={{flex:1,padding:"7px 4px",borderRadius:9,border:"none",background:reg===v?"rgba(56,189,248,.14)":"rgba(255,255,255,.04)",color:reg===v?"#38bdf8":"rgba(148,210,255,.4)",fontSize:11,fontWeight:700,cursor:"pointer",transition:"all .2s",outline:reg===v?"1px solid rgba(56,189,248,.4)":"none"}}>
            {lb}
          </button>
        ))}
      </div>
      {/* list */}
      {groups.length===0
        ? <div style={{textAlign:"center",padding:"30px 0",color:"rgba(148,210,255,.35)",fontSize:13}}>لا توجد نتائج</div>
        : groups.map(grp=>{
          const items = list.filter(l=>l.grp===grp);
          const gc = items[0]?.reg==="البحر الأحمر"?"#f87171":"#38bdf8";
          return (
            <div key={grp} style={{marginBottom:12}}>
              <div style={{fontSize:10,fontWeight:900,color:gc,marginBottom:7,display:"flex",alignItems:"center",gap:6}}>
                <span style={{width:14,height:2,background:gc,borderRadius:1,display:"inline-block"}}/>
                {grp} <span style={{color:"rgba(148,210,255,.28)",fontWeight:400}}>({items.length})</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                {items.map(loc => {
                  const active = current?.id===loc.id;
                  return (
                    <div key={loc.id} className="tap" onClick={()=>onPick(loc)}
                      style={{background:active?"rgba(16,185,129,.1)":"rgba(255,255,255,.04)",borderRadius:12,padding:"10px 13px",border:`1px solid ${active?"rgba(16,185,129,.35)":"rgba(255,255,255,.07)"}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontSize:20}}>{loc.emoji}</span>
                        <div>
                          <div style={{fontWeight:800,fontSize:14,color:active?"#10b981":"#e8f4ff"}}>{loc.name}</div>
                          <div style={{fontSize:10,color:"rgba(148,210,255,.4)"}}>{loc.type} · {loc.reg}</div>
                        </div>
                      </div>
                      {active
                        ? <span style={{fontSize:11,color:"#10b981",fontWeight:900,background:"rgba(16,185,129,.15)",borderRadius:7,padding:"2px 8px"}}>✓ محدد</span>
                        : <span style={{color:gc,fontSize:15,opacity:.45}}>‹</span>}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })
      }
    </div>
  );
}

          <>
            {/* page banner */}
            <div style={{background:ad,borderRadius:12,padding:"10px 14px",border:`1px solid ${ab}`,marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:14,fontWeight:900,color:ac}}>{isS?"🏖️ الصيد من الشاطئ":"⛵ الصيد بالقارب"}</div>
                <div style={{fontSize:10,color:"rgba(148,210,255,.5)",marginTop:2}}>📅 توقعات ١٤ يوم · {SEASON[sn]}</div>
              </div>
              <div style={{textAlign:"start"}}>
                <div style={{fontSize:12,fontWeight:900,color:ac}}>{sel.emoji} {sel.name}</div>
                <div style={{fontSize:9,color:"rgba(148,210,255,.4)",marginTop:1}}>{sel.reg}</div>
              </div>
            </div>
            {/* 14 days */}
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {days.map((d,i)=>{
                const isOpen = open===i;
                const prompt = mkPrompt(type,sel,d.wx,`${d.dayF} ${d.dateStr}`,sn);
                return (
                  <div key={i} style={{borderRadius:13,border:`1px solid ${isOpen?ab:"rgba(255,255,255,.07)"}`,overflow:"hidden",animation:`fu .25s ease ${i*.015}s both`}}>
                    <div className="tap" onClick={()=>setOpen(isOpen?null:i)}
                      style={{background:isOpen?ad:"rgba(255,255,255,.03)",padding:"10px 13px",display:"flex",alignItems:"center",gap:9}}>
                      <div style={{width:46,textAlign:"center",flexShrink:0}}>
                        <div style={{fontSize:9,color:"rgba(148,210,255,.45)",fontWeight:700}}>{d.dayS}</div>
                        <div style={{fontSize:15,fontWeight:900,color:d.isToday?ac:"#e8f4ff"}}>{d.isToday?"اليوم":d.date.getDate()}</div>
                        <div style={{fontSize:9,color:"rgba(148,210,255,.35)"}}>{MONTHS_AR[d.date.getMonth()].slice(0,3)}</div>
                      </div>
                      <div style={{flex:1,display:"flex",gap:10}}>
                        <div style={{fontSize:10,color:"rgba(200,225,255,.6)",lineHeight:1.7}}>
                          <div>🌊 {d.wx.wave}م</div><div>💨 {d.wx.wind}عق</div>
                        </div>
                        <div style={{fontSize:10,color:"rgba(200,225,255,.6)",lineHeight:1.7}}>
                          <div>🌡️ {d.wx.temp}°</div><div>{d.wx.tide==="مد"?"🔼مد":"🔽جزر"}</div>
                        </div>
                      </div>
                      <Ring score={d.score} size={46}/>
                      <span style={{color:"rgba(148,210,255,.3)",fontSize:14,display:"inline-block",transform:isOpen?"rotate(90deg)":"none",transition:"transform .2s",flexShrink:0}}>‹</span>
                    </div>
                    {isOpen && (
                      <div style={{background:"rgba(0,0,0,.2)",padding:"12px 13px",borderTop:`1px solid ${ab}`}}>
                        <div style={{fontSize:11,color:ac,fontWeight:800,marginBottom:10}}>📅 {d.dayF}، {d.dateStr} {d.date.getFullYear()}</div>
                        <div style={{marginBottom:11}}><WxGrid wx={d.wx} small/></div>
                        <AIBlock prompt={prompt} ac={ac} ad={ad} ab={ab}/>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </>
        )}
      </div>
      <Nav scr={scr} setScr={setScr} sel={sel}/>
    </div>
  );
}

/* ══════════════════════════════════════
   MAIN APP
══════════════════════════════════════ */
export default function App() {
  const [scr, setScr] = useState("home");
  const [sel, setSel] = useState(null);   // ← single global location
  const [wx,  setWx]  = useState(null);
  const [wxLoading, setWxLoading] = useState(false);
  const [tab, setTab] = useState("wx");
  const sn = season(new Date().getMonth()+1);
  const clk = useClock();

  // ── load saved location on mount ──
  useEffect(() => {
    async function loadSaved() {
      try {
        const res = await window.storage.get("hawat_location");
        if (res?.value) {
          const saved = LOCS.find(l => l.id === res.value);
          if (saved) {
            setSel(saved);
            setWxLoading(true);
            setTimeout(() => {
              const seed = saved.id.charCodeAt(0)*999 + new Date().getHours()*37;
              setWx(mkWx(saved, seed, "today"));
              setWxLoading(false);
            }, 600);
          }
        }
      } catch(_) {}
    }
    loadSaved();
  }, []);

  const pickLocation = useCallback(async loc => {
    setSel(loc);
    setWxLoading(true);
    setWx(null);
    // save to persistent storage
    try { await window.storage.set("hawat_location", loc.id); } catch(_) {}
    setTimeout(()=>{
      const seed = loc.id.charCodeAt(0)*999 + new Date().getHours()*37;
      setWx(mkWx(loc, seed, "today"));
      setWxLoading(false);
    }, 600);
  }, []);

  /* ── route: shore ── */
  if (scr==="shore") return <ForecastPage type="shore" sel={sel} setScr={setScr} scr={scr}/>;
  /* ── route: boat ── */
  if (scr==="boat")  return <ForecastPage type="boat"  sel={sel} setScr={setScr} scr={scr}/>;

  /* ── route: map ── */
  if (scr==="map") {
    const W=340,H=210, px=(la,ln)=>[((ln-34)/(52-34))*W, H-((la-16)/(30-16))*H];
    return (
      <div style={WRAP}><style>{CSS}</style>
        <Header sel={sel}/>
        <div style={{padding:`${HDR+10}px 13px 90px`}}>
          {!sel ? <NoLoc go={setScr}/> : (
            <>
              <div style={{background:"rgba(255,255,255,.04)",borderRadius:12,padding:"10px 14px",border:"1px solid rgba(255,255,255,.08)",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:14,fontWeight:900}}>🗺️ الخريطة الساحلية</div>
                  <div style={{fontSize:10,color:"rgba(148,210,255,.45)",marginTop:2}}>٢٩ موقعاً على سواحل المملكة</div>
                </div>
                <div style={{fontSize:13,fontWeight:900,color:sel.reg==="البحر الأحمر"?"#f87171":"#38bdf8"}}>{sel.emoji} {sel.name}</div>
              </div>
              <div style={{display:"flex",gap:16,marginBottom:8,fontSize:10,color:"rgba(180,220,255,.5)"}}>
                <span>🔴 البحر الأحمر</span><span>🔵 الخليج العربي</span><span style={{color:"#10b981"}}>🟢 موقعك</span>
              </div>
              <div style={{background:"rgba(0,12,40,.9)",borderRadius:14,padding:8,border:"1px solid rgba(56,189,248,.2)"}}>
                <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{borderRadius:10,display:"block"}}>
                  <rect width={W} height={H} fill="rgba(0,18,55,.95)" rx="10"/>
                  <text x="28" y="128" fill="rgba(248,113,113,.28)" fontSize="8" fontFamily="Tajawal">البحر الأحمر</text>
                  <text x="230" y="50" fill="rgba(56,189,248,.28)" fontSize="8" fontFamily="Tajawal">الخليج العربي</text>
                  {LOCS.map(loc=>{
                    const [x,y]=px(loc.lat,loc.lng), cur=sel?.id===loc.id;
                    const c=loc.reg==="البحر الأحمر"?"#f87171":"#38bdf8";
                    return (
                      <g key={loc.id}>
                        {cur && <circle cx={x} cy={y} r={15} fill="rgba(16,185,129,.14)"/>}
                        <circle cx={x} cy={y} r={cur?7:4} fill={cur?"#10b981":c} style={{filter:`drop-shadow(0 0 ${cur?7:3}px ${cur?"#10b981":c})`}}/>
                        <text x={x} y={y-(cur?11:7)} textAnchor="middle" fill={cur?"#10b981":"rgba(255,255,255,.72)"} fontSize={cur?"7.5":"6"} fontFamily="Tajawal" fontWeight={cur?"900":"400"}>{loc.name}</text>
                      </g>
                    );
                  })}
                </svg>
              </div>
              <SecretSpots/>
            </>
          )}
        </div>
        <Nav scr={scr} setScr={setScr} sel={sel}/>
      </div>
    );
  }

  /* ── route: res ── */
  if (scr==="res") {
    const sc  = wx ? shoreScore(wx) : 0;
    const col = sCol(sc);
    const verdict = sc>=70?"ممتاز للصيد! 🎣":sc>=40?"مقبول مع حذر ⚠️":"غير مناسب اليوم 🚫";
    const prompt = (sel && wx) ? mkPrompt("today",sel,wx,`${clk.day} ${clk.gregorian}`,sn) : "";
    return (
      <div style={WRAP}><style>{CSS}</style>
        <Header sel={sel}/>
        <div style={{padding:`${HDR+10}px 14px 90px`}}>
          {!sel ? <NoLoc go={setScr}/> : wxLoading ? (
            <div style={{textAlign:"center",padding:"60px 0"}}>
              <div style={{fontSize:44,animation:"pulse 1s infinite",marginBottom:10}}>🌊</div>
              <div style={{fontSize:12,color:"rgba(148,210,255,.55)"}}>جاري تحليل البيانات...</div>
            </div>
          ) : wx && (
            <>
              {/* score card */}
              <div style={{background:"rgba(255,255,255,.04)",borderRadius:16,padding:15,border:"1px solid rgba(255,255,255,.08)",marginBottom:13,animation:"fu .4s ease"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div>
                    <div style={{fontSize:10,color:"rgba(148,210,255,.45)",marginBottom:4}}>تقييم الصيد اليوم</div>
                    <div style={{fontSize:17,fontWeight:900,color:col}}>{verdict}</div>
                    <div style={{fontSize:10,color:"rgba(148,210,255,.38)",marginTop:3}}>{SEASON[sn]}</div>
                  </div>
                  <Ring score={sc} size={92}/>
                </div>
              </div>
              {/* tabs */}
              <div style={{display:"flex",background:"rgba(255,255,255,.04)",borderRadius:12,padding:3,gap:3,marginBottom:13,border:"1px solid rgba(255,255,255,.07)"}}>
                {[{id:"wx",l:"🌊 الطقس"},{id:"ai",l:"🤖 تحليل AI"},{id:"times",l:"⏰ الأوقات"}].map(t=>(
                  <button key={t.id} onClick={()=>setTab(t.id)}
                    style={{flex:1,padding:"8px 4px",borderRadius:9,border:"none",background:tab===t.id?"rgba(56,189,248,.2)":"transparent",color:tab===t.id?"#38bdf8":"rgba(180,210,255,.45)",fontSize:11,fontWeight:700,cursor:"pointer",outline:tab===t.id?"1px solid rgba(56,189,248,.3)":"none",transition:"all .2s"}}>
                    {t.l}
                  </button>
                ))}
              </div>
              {tab==="wx" && <WxGrid wx={wx}/>}
              {tab==="ai" && (
                <div style={{animation:"fu .3s ease"}}>
                  <div style={{background:"linear-gradient(135deg,rgba(56,189,248,.09),rgba(16,185,129,.06))",borderRadius:13,padding:"11px 14px",border:"1px solid rgba(56,189,248,.18)",marginBottom:11,display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:24}}>🤖</span>
                    <div>
                      <div style={{fontSize:13,fontWeight:900,color:"#38bdf8"}}>تحليل الصيد بالذكاء الاصطناعي</div>
                      <div style={{fontSize:10,color:"rgba(148,210,255,.45)",marginTop:1}}>بناءً على جميع عوامل الطقس الحالية</div>
                    </div>
                  </div>
                  <AIBlock prompt={prompt} ac="#38bdf8" ad="rgba(56,189,248,.1)" ab="rgba(56,189,248,.25)"/>
                </div>
              )}
              {tab==="times" && (
                <div style={{animation:"fu .3s ease",display:"flex",flexDirection:"column",gap:10}}>
                  {[{ic:"🌅",l:"⭐ الأفضل",t:"5:15 ص – 7:45 ص",c:"#10b981"},{ic:"🌇",l:"الوقت الثاني",t:"5:00 م – 7:30 م",c:"#38bdf8"}].map(x=>(
                    <div key={x.t} style={{background:"rgba(255,255,255,.04)",borderRadius:14,padding:"14px 16px",border:`1px solid ${x.c}33`,display:"flex",alignItems:"center",gap:12}}>
                      <span style={{fontSize:26}}>{x.ic}</span>
                      <div><div style={{fontSize:10,color:"rgba(148,210,255,.45)",marginBottom:2}}>{x.l}</div><div style={{fontSize:18,fontWeight:900,color:x.c}}>{x.t}</div></div>
                    </div>
                  ))}
                  <div style={{background:"rgba(255,255,255,.04)",borderRadius:12,padding:"12px 14px",border:"1px solid rgba(255,255,255,.07)"}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#38bdf8",marginBottom:8}}>📌 نصائح السلامة</div>
                    {["ابدأ التحضير قبل ساعة","ارتدِ سترة النجاة دائماً","راقب تغيرات الطقس","احترم أنظمة الصيد"].map(t=>(
                      <div key={t} style={{display:"flex",gap:6,marginBottom:6,fontSize:11,color:"rgba(180,220,255,.55)"}}>
                        <span style={{color:"#10b981",flexShrink:0}}>✓</span>{t}
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </>
          )}
        </div>
        <Nav scr={scr} setScr={setScr} sel={sel}/>
      </div>
    );
  }

  /* ══════ HOME ══════ */
  return (
    <div style={WRAP}><style>{CSS}</style>
      <Header sel={sel}/>
      <div style={{padding:`${HDR+10}px 14px 90px`}}>
        {/* Location picker */}
        <Picker onPick={pickLocation} current={sel}/>
      </div>
      <Nav scr={scr} setScr={setScr} sel={sel}/>
    </div>
  );
}
          </script>
</body>
</html>
